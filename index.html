<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>City Lights Tape Shelf</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-inner">
        <p class="eyebrow">Shared music archive</p>
        <h1>City Lights Tape Shelf</h1>
        <p class="lead">
          自作曲をプロジェクトやジャンルごとに整理して聴ける、小さな公開用アーカイブ。
        </p>
      </div>
    </header>

    <main class="page">
      <section class="view-head" aria-label="表示切り替え">
        <div>
          <p class="section-kicker" id="view-kicker">Library</p>
          <h2 id="view-title">Folders</h2>
          <p id="view-description">
            フォルダーを選ぶと、その中の楽曲カードだけを表示します。
          </p>
        </div>
        <button id="back-button" class="text-button" type="button" hidden>Foldersへ戻る</button>
      </section>

      <nav class="view-tabs" aria-label="フォルダーの種類">
        <button class="tab-button is-active" type="button" data-mode="project">Project</button>
        <button class="tab-button" type="button" data-mode="genre">Genre</button>
        <button class="tab-button" type="button" data-mode="vocal">Vocal</button>
      </nav>

      <section id="folder-list" class="folder-grid" aria-live="polite"></section>
      <section id="track-list" class="track-grid" aria-live="polite" hidden></section>
    </main>

    <footer class="player-dock" aria-label="音楽プレイヤー">
      <div class="now-playing">
        <span class="label">Now playing</span>
        <strong id="current-title">曲を選択してください</strong>
        <span id="current-meta">フォルダーを開いて、曲カードをタップしてください。</span>
      </div>
      <audio id="audio-player" controls preload="none">
        お使いのブラウザはHTML5 audioに対応していません。
      </audio>
    </footer>

    <script src="./data/catalog.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
